services:
  db:
    image: postgres:16-alpine
    container_name: kuppihub-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kuppihub
      POSTGRES_USER: kuppihub
      POSTGRES_PASSWORD: kuppihub
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase_migrations:/docker-entrypoint-initdb.d
volumes:
  db_data:
